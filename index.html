
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinário Adventista Cifrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .chords-font {
            font-family: 'Roboto Mono', monospace;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        /* Estilos de Impressão */
        @media print {
            body {
                overflow: visible !important;
                background: white !important;
                color: black !important;
            }
            #root > div > header,
            #root > div > main > div > div > button,
            aside,
            .fixed,
            .no-print,
            button {
                display: none !important;
            }
            #root > div > main {
                overflow: visible !important;
                height: auto !important;
                padding: 0 !important;
            }
            #root > div > main > div {
                max-width: 100% !important;
                padding: 0 !important;
            }
            .chords-font {
                color: black !important;
            }
            .text-orange-500 {
                color: #c2410c !important; /* Laranja mais escuro para melhor contraste no papel */
                font-weight: bold !important;
            }
            .bg-slate-900, .bg-white, .bg-slate-50 {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
            }
        }
    </style>
<script type="importmap">

}

</head>
